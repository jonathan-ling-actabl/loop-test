name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish Pages, and cancel superseded runs.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # No build step. Copy the site into _site, excluding repo/meta files so
      # only the actual pages are published. New apps under apps/ are included
      # automatically.
      - name: Assemble site
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.agents' \
            --exclude='.beads' \
            --exclude='_site' \
            --exclude='CLAUDE.md' \
            --exclude='README.md' \
            ./ _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
