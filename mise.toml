# mise config — https://mise.jdx.dev
# Static site with dev-only tooling (Prettier for formatting, Vitest for tests).

[tools]
node = "lts"
pnpm = "latest"

[tasks.install]
description = "Install dev dependencies"
run = "pnpm install"

[tasks.lint]
description = "Check formatting with Prettier"
run = "pnpm exec prettier --check ."

[tasks.format]
description = "Fix formatting with Prettier"
run = "pnpm exec prettier --write ."

[tasks.test]
description = "Run tests with Vitest"
run = "pnpm exec vitest run"

[tasks.serve]
description = "Serve the site at http://localhost:8000"
run = "python3 -m http.server 8000"

[tasks.open]
description = "Open the served site in the default browser"
run = "open http://localhost:8000"
